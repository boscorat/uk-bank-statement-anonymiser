# release.yml — build and publish on version tag push.
#
# Triggered by pushing a tag like "v0.1.0".  Two jobs run in sequence:
#
#   1. pypi-publish    — build wheel + sdist, publish to PyPI via OIDC.
#   2. github-release  — create a GitHub Release with all assets attached.
#
# One-time setup required:
#   - Create a "pypi" environment in GitHub repo Settings > Environments.
#   - Register a Trusted Publisher on PyPI (account > Publishing):
#       Owner: boscorat
#       Repository: uk-bank-statement-anonymiser
#       Workflow: release.yml
#       Environment: pypi

name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}  # no workflow-level permissions; each job declares its own

jobs:
  # ── Build wheel + sdist and publish to PyPI ─────────────────────────
  pypi-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-cache: false

      - name: Install Python
        run: uv python install 3.14

      - name: Validate tag matches pyproject.toml version
        id: version
        run: |
          VERSION=$(uv run python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($VERSION)"
            exit 1
          fi

      - name: Build sdist and wheel
        run: uv build

      - name: Smoke-test wheel import
        run: |
          uv run --isolated --no-project --with dist/*.whl -- \
            python -c "import bank_statement_anonymiser; print(bank_statement_anonymiser.__version__)"

      - name: Publish to PyPI
        run: uv publish

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: python-dists
          path: dist/


  # ── Create GitHub Release with all assets ───────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [pypi-publish]
    permissions:
      contents: write
    steps:
      - name: Download Python dists
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: python-dists
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          generate_release_notes: true
          files: dist/*